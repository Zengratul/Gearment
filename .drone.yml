---
# Pipeline for cleanup old images
kind: pipeline
type: docker
name: cleanup

steps:
  - name: cleanup-old-images
    image: alpine:latest
    commands:
      - echo "Cleaning up old Docker images..."
      - echo "This step would clean up old images from registry"
      - echo "Implementation depends on your registry type"

trigger:
  event:
    - cron
  cron:
    - cleanup
